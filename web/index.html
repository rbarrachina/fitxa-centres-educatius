<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fitxa de Centres Educatius</title>
  <link rel="stylesheet" href="./css/fitxa-centre.css" />
</head>
<body>
  <main class="container">
    <h1>Consulta de Centres Educatius</h1>

    <section id="sectionFitxa">
      <p>Introdueix el codi de centre (8 digits) o el nom del centre per carregar tota la informacio disponible de la fitxa oficial.</p>

      <div class="controls">
        <input id="code" type="text" placeholder="Codi o nom centre" autocomplete="off" />
        <button id="load">Carregar centre</button>
      </div>

      <div id="message" class="message"></div>
      <div id="fitxaMatchesWrap" class="hidden">
        <div class="meta">Coincidencies trobades:</div>
        <div id="fitxaMatches" class="match-list"></div>
      </div>
      <div id="meta" class="meta hidden"></div>

      <table id="resultTable" class="hidden">
        <tbody id="resultBody"></tbody>
      </table>
    </section>

    <div id="mapModalBackdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="mapModalTitle">
      <div class="modal">
        <div class="modal-header">
          <span id="mapModalTitle">Ubicacio del centre</span>
          <button id="closeMapModal" type="button">Tancar</button>
        </div>
        <div class="modal-body">
          <div class="modal-actions">
            <a id="openMapLink" href="#" target="_blank" rel="noopener noreferrer">Obrir a OpenStreetMap</a>
            <span id="mapCoordsLabel" class="meta"></span>
          </div>
          <iframe id="mapFrame" class="modal-map" title="Mapa del centre"></iframe>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Per GitHub Pages, posa aqui el backend public (ex: https://fitxa-centres-educatius-api.onrender.com)
    window.MAPES_API_BASE = "";
  </script>
  <script src="./js/fitxa-centre.js?v=20260418-fitxa-only-2"></script>
</body>
</html>

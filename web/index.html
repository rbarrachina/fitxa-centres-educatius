<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapes de Centres Educatius</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #1c2630;
      --muted: #5f6b76;
      --accent: #0a8f77;
      --danger: #b23a48;
      --border: #d7dde3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #f4f6f8, #e9eff4);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1000px, 92vw);
      margin: 32px auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1.6rem;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input {
      width: 220px;
      max-width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
    }

    input::placeholder {
      color: #8a97a4;
      opacity: 1;
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .message {
      margin-bottom: 14px;
      min-height: 1.2em;
      color: var(--muted);
    }

    .message.error {
      color: var(--danger);
    }

    .meta {
      margin-bottom: 12px;
      font-size: 0.96rem;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      width: 38%;
      background: #f7fafb;
      font-weight: 600;
    }

    .value-with-copy {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .copy-btn {
      padding: 4px 10px;
      font-size: 0.82rem;
      border-radius: 6px;
    }

    .coord-with-map {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .map-btn {
      padding: 4px 10px;
      font-size: 0.82rem;
      border-radius: 6px;
    }

    .web-btn {
      padding: 4px 10px;
      font-size: 0.82rem;
      border-radius: 6px;
    }

    .web-btn:hover{
      background-color: darkolivegreen;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 20;
    }

    .modal {
      width: min(760px, 96vw);
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: #f7fafb;
      font-weight: 600;
    }

    .modal-body {
      padding: 10px 12px 14px;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .modal-map {
      width: 100%;
      height: 440px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    tr:last-child td, tr:last-child th {
      border-bottom: 0;
    }

    .hidden {
      display: none;
    }

    .match-list {
      margin: 8px 0 0;
      display: grid;
      gap: 6px;
      max-height: 250px;
      overflow: auto;
      padding-right: 4px;
    }

    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
    }

    .match-name {
      font-weight: 700;
      color: #23313d;
    }

    .match-town {
      color: #4e6070;
      font-weight: 500;
    }

    .match-view-btn {
      padding: 4px 10px;
      font-size: 0.84rem;
      border-radius: 6px;
      flex: 0 0 auto;
    }

    @media (max-width: 760px) {
      .container {
        margin: 18px auto;
        padding: 16px;
      }

      th, td {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Consulta de Centres Educatius</h1>

    <section id="sectionFitxa">
      <p>Introdueix el codi de centre (8 digits) o el nom del centre per carregar tota la informacio disponible de la fitxa oficial.</p>

      <div class="controls">
        <input id="code" type="text" placeholder="Codi o nom centre" autocomplete="off" />
        <button id="load">Carregar centre</button>
      </div>

      <div id="message" class="message"></div>
      <div id="fitxaMatchesWrap" class="hidden">
        <div class="meta">Coincidencies trobades:</div>
        <div id="fitxaMatches" class="match-list"></div>
      </div>
      <div id="meta" class="meta hidden"></div>

      <table id="resultTable" class="hidden">
        <tbody id="resultBody"></tbody>
      </table>
    </section>

    <div id="mapModalBackdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="mapModalTitle">
      <div class="modal">
        <div class="modal-header">
          <span id="mapModalTitle">Ubicacio del centre</span>
          <button id="closeMapModal" type="button">Tancar</button>
        </div>
        <div class="modal-body">
          <div class="modal-actions">
            <a id="openMapLink" href="#" target="_blank" rel="noopener noreferrer">Obrir a OpenStreetMap</a>
            <span id="mapCoordsLabel" class="meta"></span>
          </div>
          <iframe id="mapFrame" class="modal-map" title="Mapa del centre"></iframe>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Per GitHub Pages, posa aqui el backend public (ex: https://mapes-api.onrender.com)
    window.MAPES_API_BASE = "";
  </script>
  <script src="./js/fitxa-centre.js?v=20260418-fitxa-only-2"></script>
</body>
</html>
